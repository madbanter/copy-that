# Example configuration for CopyThat
source_directory: "~/Desktop/test_source"
destination_base: "~/Desktop/test_destination"
folder_format: "%Y%m%d"
organization_mode: "date" # options: date (use folder_format), mirror (preserve source structure)
date_source: "creation" # options: creation, modification (only applies to 'date' mode)
include_extensions:
  - .jpg
  - .cr3
  - .mp4
  - .xmp
  - .jpeg
  - .arw
conflict_policy: "skip"
verification_method: "none" # options: none, size, md5, sha1
verification_failure_behavior: "retry" # options: retry (once), ignore (keep file), delete (destination only)
pre_sync_space_check: false # if true, performs a pre-scan to estimate required space
max_workers: null # number of threads for concurrent copying (null = system default, 1 = sequential)
